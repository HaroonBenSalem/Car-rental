# Spring Boot application name
spring.application.name=car-rental-api

# Database Configuration (PostgreSQL on Neon - update with your credentials)
spring.datasource.url=jdbc:postgresql://localhost:5432/carrental
spring.datasource.username=neondb_owner
spring.datasource.password=YOUR_PASSWORD_HERE
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=your-secret-key-change-this-in-production-at-least-256-bits
app.jwt.expiration=86400000

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
